<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Para o amor da minha vida 💖</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;600&display=swap" rel="stylesheet">

<style>
* {
    margin: 0;
    padding: 0;
    box-sizing: border-box;
    font-family: 'Poppins', sans-serif;
}

body {
    height: 100vh;
    background: linear-gradient(135deg, #ff4d6d, #5f0f40);
    color: white;
    display: flex;
    justify-content: center;
    align-items: center;
    text-align: center;
    overflow: hidden;
}

/* tela inicial */
#start {
    position: absolute;
}

button {
    padding: 15px 30px;
    border: none;
    border-radius: 30px;
    background: #ff4d6d;
    color: white;
    font-size: 16px;
    cursor: pointer;
    transition: 0.3s;
}

button:hover {
    transform: scale(1.1);
}

/* cena principal */
#main {
    display: none;
    flex-direction: column;
    align-items: center;
    animation: fade 2s;
}

h1 {
    margin-bottom: 10px;
    font-size: 8vw;
    font-weight: 600;
}

#texto {
    font-size: 16px;
    max-width: 500px;
    min-height: 100px;
    margin: 20px;
    padding: 0 20px;
}

/* imagem */
img {
    width: 60%;
    max-width: 250px;
    border-radius: 20px;
    opacity: 0;
    transform: scale(0.8);
    transition: 2s;
}

img.show {
    opacity: 1;
    transform: scale(1);
}

/* animações */
@keyframes fade {
    from {opacity: 0;}
    to {opacity: 1;}
}

/* corações */
.heart {
    position: absolute;
    color: rgba(255,255,255,0.6);
    animation: subir 6s linear infinite;
}

@keyframes subir {
    from {transform: translateY(100vh);}
    to {transform: translateY(-10vh);}
}
.carrossel {
    position: relative;
    width: 60%;
    max-width: 250px;
}

.carrossel img {
    width: 100%;
    border-radius: 20px;
    opacity: 0;
    transform: scale(0.8);
    transition: 1s;
}

.carrossel img.show {
    opacity: 1;
    transform: scale(1);
}

.btn {
    position: absolute;
    top: 50%;
    transform: translateY(-50%);
    background: rgba(0,0,0,0.3);
    border: none;
    color: white;
    font-size: 20px;
    padding: 5px 10px;
    cursor: pointer;
    border-radius: 10px;
}

.prev { left: -40px; }
.next { right: -40px; }

</style>
</head>

<body>

<div id="start">
    <h1>Tenho algo pra você... 💭</h1>
    <br>
    <button onclick="iniciar()">Clique aqui 💖</button>
</div>

<div id="main">
    <h1>Oi meu dengo 💕</h1>
    <div id="texto"></div>
    <div class="carrossel">
    <button class="btn prev" onclick="trocarFoto(-1)">❮</button>
    
    <img id="foto" src="static/foto1.jpg">
    
    <button class="btn next" onclick="trocarFoto(1)">❯</button>
</div>
</div>

<audio id="musica" loop>
    <source src="static/musica.mp3" type="audio/mpeg">
</audio>

<script>

const isMobile = window.innerWidth < 768;

const mensagens = [
"dasdasd",
"dasdad",
"adsa",
"dasdadas",
"dadasdas",
"dasdasdas",
"dsadasdas",
"sdadad",
"Eu te amo ❤️"
];

let i = 0;
let j = 0;

function iniciar() {
    document.getElementById("start").style.display = "none";
    document.getElementById("main").style.display = "flex";

    const audio = document.getElementById("musica");

    audio.volume = 1; // garante volume
    audio.play().then(() => {
        console.log("tocando");
    }).catch((e) => {
        console.log("erro:", e);
    });

    escreverTexto();
    setInterval(criarCoracao, isMobile ? 800 : 400);
}

function escreverTexto() {
    if (i < mensagens.length) {
        if (j < mensagens[i].length) {
            document.getElementById("texto").innerHTML += mensagens[i].charAt(j);
            j++;
            setTimeout(escreverTexto, 40);
        } else {
            document.getElementById("texto").innerHTML += "<br><br>";
            j = 0;
            i++;

            if (i === mensagens.length) {
                document.getElementById("foto").classList.add("show");
            }

            setTimeout(escreverTexto, 1000);
        }
    }
}

function criarCoracao() {
    const heart = document.createElement("div");
    heart.classList.add("heart");
    heart.innerHTML = "💖";
    heart.style.left = Math.random() * 100 + "vw";
    heart.style.fontSize = (10 + Math.random() * 20) + "px";

    document.body.appendChild(heart);

    setTimeout(() => heart.remove(), 6000);
}

const fotos = [
    "static/foto1.jpg",
    "static/foto2.jpg",
    "static/foto3.jpg",
    "static/foto4.jpg"
];

let fotoIndex = 0;

function mostrarFoto() {
    const img = document.getElementById("foto");
    
    img.classList.remove("show");

    setTimeout(() => {
        img.src = fotos[fotoIndex];
        img.classList.add("show");
    }, 200);
}

function trocarFoto(direcao) {
    fotoIndex += direcao;

    if (fotoIndex < 0) fotoIndex = fotos.length - 1;
    if (fotoIndex >= fotos.length) fotoIndex = 0;

    mostrarFoto();
}

setInterval(() => {
    trocarFoto(1);
}, 3000);

</script>

</body>
</html>
